<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | DramaXHub</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body{background:#0f1115;color:#fff;font-family:Inter,system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#171a21;border:1px solid #2a2d36;border-radius:16px;padding:32px;width:100%;max-width:400px}
input{width:100%;padding:12px 14px;margin:8px 0;border-radius:8px;border:1px solid #333;background:#0f1115;color:#fff;box-sizing:border-box}
.btn{width:100%;padding:12px;border-radius:10px;border:0;font-weight:700;cursor:pointer;margin-top:10px}
.btn-primary{background:linear-gradient(90deg,#2af,#6cf);color:#000}
.btn-google{background:#fff;color:#000;display:flex;align-items:center;justify-content:center;gap:8px}
.or{text-align:center;margin:16px 0;color:#777;font-size:14px}
h1{margin:0 0 8px 0;font-size:24px}
.sub{color:#888;font-size:14px;margin-bottom:20px}
a{color:#6cf;text-decoration:none}
#status{margin-top:12px;font-size:13px;color:#8f8}
</style>
</head>
<body>
<div class="card">
<h1>Welcome back</h1>
<p class="sub">All movies are free. Login unlocks history & smart recommendations.</p>

<input id="email" type="email" placeholder="you@example.com" autocomplete="email">
<input id="password" type="password" placeholder="Password" autocomplete="current-password">
<button class="btn btn-primary" onclick="doLogin()">Sign in</button>

<div class="or">or</div>

<!-- GOOGLE BUTTON -->
<div id="g_id_onload"
     data-client_id="249047944037-4kvhicki95p2fou38e8o6loebamc96c1.apps.googleusercontent.com"
     data-context="signin"
     data-ux_mode="popup"
     data-callback="handleGoogle"
     data-auto_prompt="false">
</div>
<div class="g_id_signin"
     data-type="standard"
     data-shape="pill"
     data-theme="filled_black"
     data-text="continue_with"
     data-size="large"
     data-logo_alignment="left"
     style="width:100%">
</div>
<button class="btn btn-google" onclick="document.querySelector('.g_id_signin div[role=button]')?.click()" style="display:none" id="fallbackGoogle">
  <img src="https://www.gstatic.com/images/branding/product/1x/gsa_64dp.png" width="18"> Continue with Google
</button>

<p id="status"></p>
<p style="font-size:13px;margin-top:16px;text-align:center">New to DramaXHub? <a href="/signup.html">Create free account</a></p>
<p style="font-size:12px;text-align:center;margin-top:8px"><a href="/">← Back to home</a></p>
</div>

<script>
const API = '';

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password) return setStatus('Enter email and password', true);
  setStatus('Signing in...');
  try{
    const r = await fetch(API + '/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password}),
      credentials:'include'
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.error || 'Login failed');
    setStatus('Success! Redirecting...');
    location.href = '/';
  }catch(e){
    setStatus(e.message, true);
  }
}

async function handleGoogle(response){
  setStatus('Verifying with Google...');
  try{
    const r = await fetch(API + '/api/auth/google', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ credential: response.credential }),
      credentials:'include'
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.error || 'Google login failed');
    setStatus('Google login successful! Redirecting...');
    // Small delay so cookie sets
    setTimeout(()=> location.href = '/', 500);
  }catch(e){
    console.error(e);
    setStatus('Google login failed: ' + e.message, true);
    alert('Google login failed: ' + e.message);
  }
}

function setStatus(msg, isError=false){
  const el = document.getElementById('status');
  el.style.color = isError ? '#ff6b6b' : '#8fffa0';
  el.textContent = msg;
}

// check if already logged in
fetch('/api/auth/me', {credentials:'include'}).then(r=>r.json()).then(d=>{
  if(d.user){
    document.body.innerHTML = '<div class="card"><h1>Already logged in</h1><p class="sub">Hi '+ (d.user.name||d.user.email) +'</p><p><a href="/">Go to home</a> | <a href="#" onclick="fetch(\'/api/auth/logout\',{method:\'POST\',credentials:\'include\'}).then(()=>location.reload())">Logout</a></p></div>';
  }
});
</script>
</body>
</html>
